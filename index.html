<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>StokResto</title>
    <link rel="icon" href="mascot.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e334d;
        --accent: #ff6b35;
        --accent2: #ffd166;
        --green: #06d6a0;
        --red: #ef476f;
        --text: #e8eaf6;
        --text2: #8892b0;
        --radius: 16px;
        --radius-sm: 10px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        padding-bottom: 90px;
        overflow-x: hidden;
      }

      /* Header */
      .header {
        padding: 52px 20px 16px;
        background: linear-gradient(180deg, #0f1117 0%, transparent 100%);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 22px;
      }
      .logo span {
        color: var(--accent);
      }
      .notif-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--surface);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }
      .tab {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
      }
      .tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* Main */
      .main {
        padding: 0 16px;
      }

      /* Stats */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 16px 0;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
      }
      .stat-label {
        font-size: 11px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .stat-val {
        font-family: "Syne", sans-serif;
        font-size: 26px;
        font-weight: 700;
      }
      .stat-val.orange {
        color: var(--accent);
      }
      .stat-val.green {
        color: var(--green);
      }
      .stat-val.yellow {
        color: var(--accent2);
      }
      .stat-val.red {
        color: var(--red);
      }

      /* Section Header */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 20px 0 12px;
      }
      .section-title {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 700;
      }
      .add-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 7px 14px;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* Supplier Card */
      .supplier-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 10px;
        animation: fadeUp 0.3s ease;
      }
      .supplier-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .supplier-name {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
      }
      .supplier-contact {
        font-size: 12px;
        color: var(--text2);
        margin-top: 2px;
      }
      .supplier-actions {
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 13px;
      }
      .icon-btn.wa {
        background: #25d366;
        border-color: #25d366;
      }
      .supplier-items {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .item-tag {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* Stock Items */
      .item-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: fadeUp 0.3s ease;
      }
      .item-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        color: var(--text2);
        font-size: 14px;
      }
      .item-info {
        flex: 1;
        min-width: 0;
      }
      .item-name {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .item-meta {
        font-size: 11px;
        color: var(--text2);
      }
      .item-right {
        text-align: right;
        flex-shrink: 0;
      }
      .item-stock {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 700;
      }
      .item-unit {
        font-size: 11px;
        color: var(--text2);
      }
      .status-pill {
        display: inline-block;
        border-radius: 20px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
        margin-top: 4px;
      }
      .status-pill.ok {
        background: rgba(6, 214, 160, 0.15);
        color: var(--green);
      }
      .status-pill.low {
        background: rgba(255, 209, 102, 0.15);
        color: var(--accent2);
      }
      .status-pill.empty {
        background: rgba(239, 71, 111, 0.15);
        color: var(--red);
      }

      /* Stock bar */
      .stock-bar {
        height: 3px;
        border-radius: 2px;
        background: var(--border);
        margin-top: 6px;
        overflow: hidden;
      }
      .stock-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.5s ease;
      }
      .fill-ok {
        background: var(--green);
      }
      .fill-low {
        background: var(--accent2);
      }
      .fill-empty {
        background: var(--red);
      }

      /* Bottom Nav */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 430px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 10px 0 24px;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        cursor: pointer;
        padding: 4px 16px;
        border-radius: 12px;
      }
      .nav-icon {
        font-size: 20px;
      }
      .nav-label {
        font-size: 10px;
        color: var(--text2);
        font-weight: 500;
      }
      .nav-item.active .nav-label {
        color: var(--accent);
      }
      .nav-item.active .nav-icon {
        filter: drop-shadow(0 0 6px var(--accent));
      }

      /* FAB */
      .fab {
        position: fixed;
        bottom: 85px;
        right: 50%;
        transform: translateX(calc(215px - 28px));
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), #ff8c42);
        border: none;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
      }
      .fab:active {
        transform: translateX(calc(215px - 28px)) scale(0.93);
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        animation: fadeIn 0.2s ease;
        backdrop-filter: blur(4px);
      }
      .modal-overlay.hidden {
        display: none;
      }
      .modal {
        background: var(--surface);
        border-radius: 24px 24px 0 0;
        width: 100%;
        max-width: 430px;
        padding: 20px 20px 40px;
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 0 auto 20px;
      }
      .modal-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-label {
        font-size: 12px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
        display: block;
      }
      .form-input {
        width: 100%;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        border-color: var(--accent);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .form-select {
        width: 100%;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        appearance: none;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn {
        flex: 1;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: none;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn:active {
        opacity: 0.8;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-danger {
        background: rgba(239, 71, 111, 0.15);
        color: var(--red);
        border: 1px solid rgba(239, 71, 111, 0.3);
      }

      /* Search */
      .search-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .search-input {
        width: 100%;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 11px 14px 11px 38px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text2);
        font-size: 16px;
      }

      /* Empty */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--text2);
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
      }

      /* Shopping list */
      .shop-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: fadeUp 0.3s ease;
      }
      .checkbox {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .checkbox.checked {
        background: var(--green);
        border-color: var(--green);
      }
      .checkbox.checked::after {
        content: "✓";
        color: #fff;
        font-size: 13px;
        font-weight: 700;
      }
      .shop-info {
        flex: 1;
      }
      .shop-name {
        font-size: 14px;
        font-weight: 500;
      }
      .shop-meta {
        font-size: 11px;
        color: var(--text2);
        margin-top: 2px;
      }
      .shop-qty {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
      }

      /* Supplier group in shopping */
      .supplier-group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0 8px;
      }
      .supplier-group-name {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .wa-group-btn {
        background: #25d366;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: "Syne", sans-serif;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .section-divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
        opacity: 0.5;
      }
      .toast {
        position: fixed;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--green);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        z-index: 200;
        animation: fadeUp 0.3s ease;
        display: none;
      }
      /* Confirm Modal */
      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .confirm-overlay.hidden {
        display: none;
      }
      .confirm-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px 20px;
        width: 100%;
        max-width: 320px;
        text-align: center;
      }
      .confirm-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .confirm-msg {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .confirm-sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 20px;
      }
      .confirm-btns {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast"></div>

    <div class="header">
      <div class="header-top">
        <div class="logo">Stok<span>Resto</span></div>
        <div class="notif-btn">🔔</div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('dashboard')">
          📊 Dashboard
        </button>
        <button class="tab" onclick="switchTab('items')">📦 Bahan</button>
        <button class="tab" onclick="switchTab('suppliers')">
          🏪 Supplier
        </button>
        <button class="tab" onclick="switchTab('shopping')">🛒 Belanja</button>
      </div>
    </div>

    <div class="main">
      <!-- DASHBOARD -->
      <div id="tab-dashboard">
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total Bahan</div>
            <div class="stat-val orange" id="stat-total">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Stok Aman</div>
            <div class="stat-val green" id="stat-ok">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Stok Menipis</div>
            <div class="stat-val yellow" id="stat-low">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Habis</div>
            <div class="stat-val red" id="stat-empty">0</div>
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">⚠️ Perlu Dibeli</div>
        </div>
        <div id="urgent-list"></div>

        <div class="section-header">
          <div class="section-title">🏪 Supplier Aktif</div>
        </div>
        <div id="supplier-summary"></div>
      </div>

      <!-- ITEMS -->
      <div id="tab-items" style="display: none">
        <div class="section-header">
          <div class="section-title">📦 Semua Bahan</div>
          <button class="add-btn" onclick="openItemModal()">+ Tambah</button>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            class="search-input"
            placeholder="Cari bahan..."
            oninput="filterItems(this.value)"
          />
        </div>
        <div id="items-list"></div>
      </div>

      <!-- SUPPLIERS -->
      <div id="tab-suppliers" style="display: none">
        <div class="section-header">
          <div class="section-title">🏪 Supplier</div>
          <button class="add-btn" onclick="openSupplierModal()">
            + Tambah
          </button>
        </div>
        <div id="suppliers-list"></div>
      </div>

      <!-- SHOPPING -->
      <div id="tab-shopping" style="display: none">
        <div class="section-header">
          <div class="section-title">🛒 Daftar Belanja</div>
          <button class="add-btn" onclick="openShopModal()">+ Tambah</button>
        </div>
        <div id="shopping-list"></div>
      </div>
    </div>

    <!-- MODAL TAMBAH/EDIT BAHAN -->
    <div class="modal-overlay hidden" id="item-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="item-modal-title">Tambah Bahan</div>
        <div class="form-group">
          <label class="form-label">Nama Bahan</label>
          <input
            class="form-input"
            id="item-name"
            placeholder="cth: Bawang Merah"
          />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Stok Sekarang</label>
            <input
              class="form-input"
              id="item-stock"
              type="number"
              placeholder="0"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Min. Stok</label>
            <input
              class="form-input"
              id="item-min"
              type="number"
              placeholder="0"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Satuan</label>
            <input
              class="form-input"
              id="item-unit"
              placeholder="kg / liter / pcs"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Emoji</label>
            <input
              class="form-input"
              id="item-emoji"
              placeholder="🧅"
              maxlength="2"
            />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Supplier</label>
          <select class="form-select" id="item-supplier"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Kategori</label>
          <input
            class="form-input"
            id="item-cat"
            placeholder="cth: Bumbu, Sayur, Daging..."
          />
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeItemModal()">
            Batal
          </button>
          <button
            class="btn btn-primary"
            id="item-modal-title2"
            onclick="saveItem()"
          >
            Simpan
          </button>
        </div>
        <div id="item-delete-btn" style="display: none; margin-top: 10px">
          <button
            class="btn btn-danger"
            style="width: 100%"
            onclick="deleteItem()"
          >
            🗑 Hapus Bahan
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL SUPPLIER -->
    <div class="modal-overlay hidden" id="supplier-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="supplier-modal-title">Tambah Supplier</div>
        <div class="form-group">
          <label class="form-label">Nama Supplier</label>
          <input
            class="form-input"
            id="sup-name"
            placeholder="cth: Supplier A"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp</label>
          <input
            class="form-input"
            id="sup-wa"
            type="tel"
            placeholder="cth: 08123456789"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Alamat / Keterangan</label>
          <input
            class="form-input"
            id="sup-address"
            placeholder="cth: Pasar Beringharjo, Kios 12"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input
            class="form-input"
            id="sup-emoji"
            placeholder="🏪"
            maxlength="2"
          />
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeSupplierModal()">
            Batal
          </button>
          <button class="btn btn-primary" onclick="saveSupplier()">
            Simpan
          </button>
        </div>
        <div id="sup-delete-btn" style="display: none; margin-top: 10px">
          <button
            class="btn btn-danger"
            style="width: 100%"
            onclick="deleteSupplier()"
          >
            🗑 Hapus Supplier
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL SHOPPING -->
    <div class="modal-overlay hidden" id="shop-modal">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">Tambah ke Daftar Belanja</div>
        <div class="form-group">
          <label class="form-label">Bahan</label>
          <select class="form-select" id="shop-item-sel"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Jumlah</label>
            <input
              class="form-input"
              id="shop-qty"
              type="number"
              placeholder="0"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Satuan</label>
            <input class="form-input" id="shop-unit-disp" readonly />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Catatan</label>
          <input class="form-input" id="shop-note" placeholder="Opsional..." />
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeShopModal()">
            Batal
          </button>
          <button class="btn btn-primary" onclick="saveShopItem()">
            Tambah
          </button>
        </div>
      </div>
    </div>

    <!-- CONFIRM MODAL -->
    <div class="confirm-overlay hidden" id="confirm-modal">
      <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-msg" id="confirm-msg">Hapus ini?</div>
        <div class="confirm-sub" id="confirm-sub">
          Tindakan ini tidak bisa dibatalkan.
        </div>
        <div class="confirm-btns">
          <button
            class="btn btn-secondary"
            style="flex: 1"
            onclick="closeConfirm()"
          >
            Batal
          </button>
          <button
            class="btn btn-danger"
            style="flex: 1; background: var(--red); color: #fff; border: none"
            id="confirm-ok-btn"
          >
            Hapus
          </button>
        </div>
      </div>
    </div>

    <script>
      // ===== CONFIRM MODAL =====
      function showConfirm(msg, sub, onOk) {
        document.getElementById("confirm-msg").textContent = msg;
        document.getElementById("confirm-sub").textContent =
          sub || "Tindakan ini tidak bisa dibatalkan.";
        const okBtn = document.getElementById("confirm-ok-btn");
        okBtn.onclick = () => {
          closeConfirm();
          onOk();
        };
        document.getElementById("confirm-modal").classList.remove("hidden");
      }
      function closeConfirm() {
        document.getElementById("confirm-modal").classList.add("hidden");
      }

      // ===== STATE =====
      let state = JSON.parse(localStorage.getItem("stokresto") || "null") || {
        suppliers: [
          {
            id: 1,
            name: "Supplier Sayur",
            wa: "6281234567890",
            address: "Pasar Beringharjo, Kios 5",
            emoji: "🥬",
          },
          {
            id: 2,
            name: "Supplier Daging",
            wa: "6289876543210",
            address: "Pasar Kranggan",
            emoji: "🥩",
          },
        ],
        items: [
          {
            id: 1,
            name: "Bawang Merah",
            stock: 5,
            min: 3,
            unit: "kg",
            emoji: "🧅",
            supplierId: 1,
            cat: "Bumbu",
          },
          {
            id: 2,
            name: "Ayam",
            stock: 2,
            min: 5,
            unit: "kg",
            emoji: "🍗",
            supplierId: 2,
            cat: "Daging",
          },
          {
            id: 3,
            name: "Cabai Merah",
            stock: 0,
            min: 2,
            unit: "kg",
            emoji: "🌶️",
            supplierId: 1,
            cat: "Bumbu",
          },
          {
            id: 4,
            name: "Tomat",
            stock: 8,
            min: 3,
            unit: "kg",
            emoji: "🍅",
            supplierId: 1,
            cat: "Sayur",
          },
          {
            id: 5,
            name: "Daging Sapi",
            stock: 3,
            min: 4,
            unit: "kg",
            emoji: "🥩",
            supplierId: 2,
            cat: "Daging",
          },
        ],
        shopping: [],
        nextId: 10,
      };

      let editingItemId = null;
      let editingSupId = null;
      let currentTab = "dashboard";

      function save() {
        localStorage.setItem("stokresto", JSON.stringify(state));
      }

      // ===== TABS =====
      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab").forEach((t, i) => {
          const tabs = ["dashboard", "items", "suppliers", "shopping"];
          t.classList.toggle("active", tabs[i] === tab);
        });
        ["dashboard", "items", "suppliers", "shopping"].forEach((t) => {
          document.getElementById("tab-" + t).style.display =
            t === tab ? "" : "none";
        });
        render();
      }

      // ===== STATUS =====
      function getStatus(item) {
        if (item.stock <= 0) return "empty";
        if (item.stock <= item.min) return "low";
        return "ok";
      }
      function statusLabel(s) {
        return s === "ok" ? "Aman" : s === "low" ? "Menipis" : "Habis";
      }
      function stockPct(item) {
        if (!item.min) return 100;
        return Math.min(100, Math.round((item.stock / (item.min * 2)) * 100));
      }

      // ===== RENDER =====
      function render() {
        renderStats();
        if (currentTab === "dashboard") renderDashboard();
        if (currentTab === "items") renderItems();
        if (currentTab === "suppliers") renderSuppliers();
        if (currentTab === "shopping") renderShopping();
      }

      function renderStats() {
        const total = state.items.length;
        const ok = state.items.filter((i) => getStatus(i) === "ok").length;
        const low = state.items.filter((i) => getStatus(i) === "low").length;
        const empty = state.items.filter(
          (i) => getStatus(i) === "empty",
        ).length;
        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-ok").textContent = ok;
        document.getElementById("stat-low").textContent = low;
        document.getElementById("stat-empty").textContent = empty;
      }

      function renderDashboard() {
        const urgent = state.items.filter((i) => getStatus(i) !== "ok");
        const ul = document.getElementById("urgent-list");
        if (!urgent.length) {
          ul.innerHTML =
            '<div class="empty"><div class="empty-icon">✅</div><div>Semua stok aman!</div></div>';
        } else {
          ul.innerHTML = urgent.map((item) => itemCard(item)).join("");
        }

        const ss = document.getElementById("supplier-summary");
        ss.innerHTML = state.suppliers
          .map((sup) => {
            const items = state.items.filter((i) => i.supplierId === sup.id);
            return `<div class="supplier-card">
      <div class="supplier-header">
        <div>
          <div class="supplier-name">${sup.emoji || "🏪"} ${sup.name}</div>
          <div class="supplier-contact">📍 ${sup.address || "-"}</div>
        </div>
        <div class="supplier-actions">
          <button class="icon-btn wa" onclick="chatWA(${sup.id})" title="Chat WA">💬</button>
        </div>
      </div>
      <div class="supplier-items">${items.map((i) => `<div class="item-tag">${i.emoji ? i.emoji + " " : ""}${i.name}</div>`).join("")}</div>
    </div>`;
          })
          .join("");
      }

      function itemCard(item, editable = true) {
        const s = getStatus(item);
        const pct = stockPct(item);
        const sup = state.suppliers.find((x) => x.id === item.supplierId);
        const iconContent = item.emoji
          ? item.emoji
          : item.name.substring(0, 2).toUpperCase();
        const iconStyle = item.emoji ? "font-size:20px" : "font-size:13px";
        return `<div class="item-card" ${editable ? `onclick="openItemModal(${item.id})"` : ""}>
    <div class="item-icon" style="${iconStyle}">${iconContent}</div>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-meta">${item.cat || ""} ${sup ? "· " + sup.name : ""}</div>
      <div class="stock-bar"><div class="stock-bar-fill fill-${s}" style="width:${pct}%"></div></div>
    </div>
    <div class="item-right">
      <div class="item-stock">${item.stock}</div>
      <div class="item-unit">${item.unit}</div>
      <div class="status-pill ${s}">${statusLabel(s)}</div>
    </div>
  </div>`;
      }

      function renderItems(filter = "") {
        const list = filter
          ? state.items.filter((i) =>
              i.name.toLowerCase().includes(filter.toLowerCase()),
            )
          : state.items;
        const el = document.getElementById("items-list");
        el.innerHTML = list.length
          ? list.map((i) => itemCard(i)).join("")
          : '<div class="empty"><div class="empty-icon">📦</div><div>Belum ada bahan</div></div>';
      }

      function filterItems(v) {
        renderItems(v);
      }

      function renderSuppliers() {
        const el = document.getElementById("suppliers-list");
        if (!state.suppliers.length) {
          el.innerHTML =
            '<div class="empty"><div class="empty-icon">🏪</div><div>Belum ada supplier</div></div>';
          return;
        }
        el.innerHTML = state.suppliers
          .map((sup) => {
            const items = state.items.filter((i) => i.supplierId === sup.id);
            return `<div class="supplier-card">
      <div class="supplier-header">
        <div>
          <div class="supplier-name">${sup.emoji || "🏪"} ${sup.name}</div>
          <div class="supplier-contact">📱 ${formatWA(sup.wa)} · 📍 ${sup.address || "-"}</div>
        </div>
        <div class="supplier-actions">
          <button class="icon-btn wa" onclick="chatWA(${sup.id})">💬</button>
          <button class="icon-btn" onclick="openSupplierModal(${sup.id})">✏️</button>
        </div>
      </div>
      <div class="supplier-items">
        ${items.length ? items.map((i) => `<div class="item-tag">${i.emoji ? i.emoji + " " : ""}${i.name} (${i.stock} ${i.unit})</div>`).join("") : '<span style="font-size:12px;color:var(--text2)">Belum ada bahan</span>'}
      </div>
    </div>`;
          })
          .join("");
      }

      function renderShopping() {
        const el = document.getElementById("shopping-list");
        if (!state.shopping.length) {
          el.innerHTML =
            '<div class="empty"><div class="empty-icon">🛒</div><div>Daftar belanja kosong</div></div>';
          return;
        }

        // group by supplier
        const groups = {};
        state.shopping.forEach((s) => {
          const item = state.items.find((i) => i.id === s.itemId);
          if (!item) return;
          const sup = state.suppliers.find((x) => x.id === item.supplierId);
          const key = sup ? sup.id : 0;
          if (!groups[key]) groups[key] = { sup, items: [] };
          groups[key].items.push({ ...s, item, sup });
        });

        el.innerHTML = Object.values(groups)
          .map((g) => {
            const supName = g.sup
              ? `${g.sup.emoji || "🏪"} ${g.sup.name}`
              : "Tanpa Supplier";
            return `
      <div class="supplier-group-header">
        <div class="supplier-group-name">${supName}</div>
        ${g.sup ? `<button class="wa-group-btn" onclick="chatWAGroup(${g.sup.id})">💬 Chat WA</button>` : ""}
      </div>
      ${g.items
        .map(
          (s) => `
        <div class="shop-item">
          <div class="checkbox" onclick="toggleShop('${s.id}')"></div>
          <div class="shop-info">
            <div class="shop-name">${s.item.emoji ? s.item.emoji + " " : ""}${s.item.name}</div>
            <div class="shop-meta">${s.note || ""}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div>
              <div class="shop-qty">${s.qty}</div>
              <div class="item-unit">${s.item.unit}</div>
            </div>
            <button class="icon-btn" onclick="deleteShopItem('${s.id}')">🗑</button>
          </div>
        </div>
      `,
        )
        .join("")}
      <div class="section-divider"></div>
    `;
          })
          .join("");
      }

      // ===== WHATSAPP =====
      function formatWA(wa) {
        return wa ? wa.replace(/^0/, "62").replace(/\D/g, "") : "";
      }
      function chatWA(supId) {
        const sup = state.suppliers.find((x) => x.id === supId);
        if (!sup || !sup.wa) {
          showToast("Nomor WA belum diisi!");
          return;
        }
        const items = state.items.filter((i) => i.supplierId === supId);
        const msg =
          `Assalamualaikum ${sup.name}...,\n\npesen meniko njeh...\n` +
          items.map((i) => `- ${i.name}: ...${i.unit}`).join("\n") +
          `\n\nMaturnuwun 🙏`;
        openWA(sup.wa, msg);
      }
      function chatWAGroup(supId) {
        const sup = state.suppliers.find((x) => x.id === supId);
        if (!sup || !sup.wa) {
          showToast("Nomor WA belum diisi!");
          return;
        }
        const shopItems = state.shopping.filter((s) => {
          const item = state.items.find((i) => i.id === s.itemId);
          return item && item.supplierId === supId && !s.checked;
        });
        if (!shopItems.length) {
          showToast("Tidak ada item yang perlu dibeli!");
          return;
        }
        const msg =
          `Halo ${sup.name},\n\nSaya ingin memesan:\n` +
          shopItems
            .map((s) => {
              const item = state.items.find((i) => i.id === s.itemId);
              return `- ${item.name}: ${s.qty} ${item.unit}${s.note ? " (" + s.note + ")" : ""}`;
            })
            .join("\n") +
          `\n\nMohon konfirmasi. Terima kasih! 🙏`;
        openWA(sup.wa, msg);
      }
      function openWA(wa, msg) {
        const num = formatWA(wa);
        const url = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
        window.open(url, "_blank");
      }

      // ===== ITEM MODAL =====
      function openItemModal(id = null) {
        editingItemId = id !== null ? Number(id) : null;
        const modal = document.getElementById("item-modal");
        const sel = document.getElementById("item-supplier");
        sel.innerHTML =
          '<option value="">- Pilih Supplier -</option>' +
          state.suppliers
            .map(
              (s) =>
                `<option value="${s.id}">${s.emoji || "🏪"} ${s.name}</option>`,
            )
            .join("");

        if (editingItemId !== null) {
          const item = state.items.find((i) => Number(i.id) === editingItemId);
          if (!item) return;
          document.getElementById("item-modal-title").textContent =
            "Edit Bahan";
          document.getElementById("item-name").value = item.name;
          document.getElementById("item-stock").value = item.stock;
          document.getElementById("item-min").value = item.min;
          document.getElementById("item-unit").value = item.unit;
          document.getElementById("item-emoji").value = item.emoji || "";
          document.getElementById("item-cat").value = item.cat || "";
          sel.value = item.supplierId || "";
          document.getElementById("item-delete-btn").style.display = "";
        } else {
          document.getElementById("item-modal-title").textContent =
            "Tambah Bahan";
          [
            "item-name",
            "item-stock",
            "item-min",
            "item-unit",
            "item-emoji",
            "item-cat",
          ].forEach((fid) => (document.getElementById(fid).value = ""));
          sel.value = "";
          document.getElementById("item-delete-btn").style.display = "none";
        }
        modal.classList.remove("hidden");
      }
      function closeItemModal() {
        document.getElementById("item-modal").classList.add("hidden");
      }
      function saveItem() {
        const name = document.getElementById("item-name").value.trim();
        if (!name) {
          showToast("Nama bahan wajib diisi!");
          return;
        }
        const data = {
          name,
          stock: parseFloat(document.getElementById("item-stock").value) || 0,
          min: parseFloat(document.getElementById("item-min").value) || 0,
          unit: document.getElementById("item-unit").value || "pcs",
          emoji: document.getElementById("item-emoji").value || "",
          cat: document.getElementById("item-cat").value,
          supplierId:
            parseInt(document.getElementById("item-supplier").value) || null,
        };
        if (editingItemId !== null) {
          const idx = state.items.findIndex(
            (i) => Number(i.id) === editingItemId,
          );
          state.items[idx] = { ...state.items[idx], ...data };
          showToast("Bahan diperbarui!");
        } else {
          state.items.push({ id: state.nextId++, ...data });
          showToast("Bahan ditambahkan!");
        }
        save();
        closeItemModal();
        render();
      }
      function deleteItem() {
        const item = state.items.find((i) => Number(i.id) === editingItemId);
        showConfirm(
          `Hapus "${item ? item.name : "bahan ini"}"?`,
          "Bahan akan dihapus permanen.",
          () => {
            state.items = state.items.filter(
              (i) => Number(i.id) !== editingItemId,
            );
            save();
            closeItemModal();
            render();
            showToast("Bahan dihapus!");
          },
        );
      }

      // ===== SUPPLIER MODAL =====
      function openSupplierModal(id = null) {
        editingSupId = id !== null ? Number(id) : null;
        const modal = document.getElementById("supplier-modal");
        if (editingSupId !== null) {
          const sup = state.suppliers.find(
            (s) => Number(s.id) === editingSupId,
          );
          if (!sup) return;
          document.getElementById("supplier-modal-title").textContent =
            "Edit Supplier";
          document.getElementById("sup-name").value = sup.name;
          document.getElementById("sup-wa").value = sup.wa || "";
          document.getElementById("sup-address").value = sup.address || "";
          document.getElementById("sup-emoji").value = sup.emoji || "";
          document.getElementById("sup-delete-btn").style.display = "";
        } else {
          document.getElementById("supplier-modal-title").textContent =
            "Tambah Supplier";
          ["sup-name", "sup-wa", "sup-address", "sup-emoji"].forEach(
            (fid) => (document.getElementById(fid).value = ""),
          );
          document.getElementById("sup-delete-btn").style.display = "none";
        }
        modal.classList.remove("hidden");
      }
      function closeSupplierModal() {
        document.getElementById("supplier-modal").classList.add("hidden");
      }
      function saveSupplier() {
        const name = document.getElementById("sup-name").value.trim();
        if (!name) {
          showToast("Nama supplier wajib diisi!");
          return;
        }
        const data = {
          name,
          wa: document.getElementById("sup-wa").value,
          address: document.getElementById("sup-address").value,
          emoji: document.getElementById("sup-emoji").value || "🏪",
        };
        if (editingSupId !== null) {
          const idx = state.suppliers.findIndex(
            (s) => Number(s.id) === editingSupId,
          );
          state.suppliers[idx] = { ...state.suppliers[idx], ...data };
          showToast("Supplier diperbarui!");
        } else {
          state.suppliers.push({ id: state.nextId++, ...data });
          showToast("Supplier ditambahkan!");
        }
        save();
        closeSupplierModal();
        render();
      }
      function deleteSupplier() {
        const sup = state.suppliers.find((s) => Number(s.id) === editingSupId);
        showConfirm(
          `Hapus "${sup ? sup.name : "supplier ini"}"?`,
          "Supplier akan dihapus permanen.",
          () => {
            state.suppliers = state.suppliers.filter(
              (s) => Number(s.id) !== editingSupId,
            );
            save();
            closeSupplierModal();
            render();
            showToast("Supplier dihapus!");
          },
        );
      }

      // ===== SHOPPING MODAL =====
      function openShopModal() {
        const sel = document.getElementById("shop-item-sel");
        sel.innerHTML = state.items
          .map(
            (i) =>
              `<option value="${i.id}">${i.emoji ? i.emoji + " " : ""}${i.name}</option>`,
          )
          .join("");
        updateShopUnit();
        document.getElementById("shop-qty").value = "";
        document.getElementById("shop-note").value = "";
        document.getElementById("shop-modal").classList.remove("hidden");
      }
      function updateShopUnit() {
        const itemId = parseInt(document.getElementById("shop-item-sel").value);
        const item = state.items.find((i) => i.id === itemId);
        document.getElementById("shop-unit-disp").value = item ? item.unit : "";
      }
      document
        .getElementById("shop-item-sel")
        ?.addEventListener("change", updateShopUnit);
      function closeShopModal() {
        document.getElementById("shop-modal").classList.add("hidden");
      }
      function saveShopItem() {
        const itemId = parseInt(document.getElementById("shop-item-sel").value);
        const qty = parseFloat(document.getElementById("shop-qty").value) || 0;
        if (!itemId || !qty) {
          showToast("Pilih bahan dan isi jumlah!");
          return;
        }
        state.shopping.push({
          id: String(state.nextId++),
          itemId,
          qty,
          note: document.getElementById("shop-note").value,
          checked: false,
        });
        save();
        closeShopModal();
        render();
        showToast("Ditambahkan ke daftar belanja!");
      }
      function toggleShop(id) {
        // langsung hapus saat di-checklist
        state.shopping = state.shopping.filter((x) => x.id !== id);
        save();
        renderShopping();
        showToast("Item dihapus dari daftar belanja ✓");
      }
      function deleteShopItem(id) {
        state.shopping = state.shopping.filter((x) => x.id !== id);
        save();
        renderShopping();
      }

      // ===== TOAST =====
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 2000);
      }

      // ===== CLOSE MODAL ON OVERLAY =====
      document.querySelectorAll(".modal-overlay").forEach((o) => {
        o.addEventListener("click", (e) => {
          if (e.target === o) {
            o.classList.add("hidden");
          }
        });
      });

      // ===== INIT =====
      render();
    </script>
  </body>
</html>
